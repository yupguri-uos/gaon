server {
    listen 80;
    server_name gaon.uk _;
    client_max_body_size 20m;

    location = /_ok { return 200 "nginx ok\n"; add_header Content-Type text/plain; }

    location /landing/ {                 # 랜딩 (base=/landing/ 빌드한 dist) — 콘텐츠 얹기 전 404
        alias /srv/landing/;
        try_files $uri $uri/ /landing/index.html;
    }
    location /api/ {
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://app:8000;
    rewrite ^/api/(.*)$ /$1 break;         # /api/health → /health 로 명시 제거
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {                         # 앱 (Flutter SPA 폴백) — 콘텐츠 얹기 전 404
        root /srv/app;
        try_files $uri $uri/ /index.html;
    }
}