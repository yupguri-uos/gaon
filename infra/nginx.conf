server {
    listen 80;
    server_name gaon.uk _;

    location = /_ok { return 200 "nginx ok\n"; add_header Content-Type text/plain; }

    location /landing/ {                 # 랜딩 (base=/landing/ 빌드한 dist) — 콘텐츠 얹기 전 404
        alias /srv/landing/;
        try_files $uri $uri/ /landing/index.html;
    }
    location /api/ {                     # /api 프리픽스 제거 후 FastAPI로 (끝 슬래시가 핵심)
        proxy_pass http://app:8000/;     # /api/me → app:8000/me
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {                         # 앱 (Flutter SPA 폴백) — 콘텐츠 얹기 전 404
        root /srv/app;
        try_files $uri $uri/ /index.html;
    }
}